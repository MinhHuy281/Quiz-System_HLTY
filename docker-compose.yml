version: '3.9'

services:
  backend:
    build: ./backend
    container_name: quiz_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: quiz_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quiz_system
    ports:
      - "3307:3306"