name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/*

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run lint
        run: |
          cd frontend
          npm run lint

      - name: Run test
        run: |
          cd frontend
          npm run test

      - name: Build project
        run: |
          cd frontend
          npm run build